[global]
    font = Monospace 11
    frame_color = "{color1}"
    separator_color = "{color1}"

[urgency_low]
    background = "{color0}"
    foreground = "{foreground}"
    frame_color = "{color1}"
    timeout = 5

[urgency_normal]
    background = "{color0}"
    foreground = "{foreground}"
    frame_color = "{color2}"
    timeout = 10

[urgency_critical]
    background = "{color1}"
    foreground = "{foreground}"
    frame_color = "{color3}"
    timeout = 0
