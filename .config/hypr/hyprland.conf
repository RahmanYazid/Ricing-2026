source = /home/zomboid/.cache/wal/colors-hyprland.conf


# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua
#monitor
#monitor = HDMI-A-1, 1920x1080@60.00000, 0x0, 1
# monitor=nama_port, resolusi@refresh_rate, posisi, skala
#monitor=,highrr,auto,1
# Format: monitor=NAMA,RESOLUSI@FPS,POSISI,SKALA
monitor = HDMI-A-1, 1920x1080@60.00Hz, 0x0, 1

misc {
    vrr = 0

    # Mematikan logo hyprland saat startup agar boot terasa lebih cepat
    disable_hyprland_logo = true
    force_default_wallpaper = 0
  }


$mainMod = SUPER
$terminal = kitty --listen-on unix:/tmp/kitty.sock
$fileManager = yazi
$menu = rofi

bind = $mainMod, return, exec, kitty --listen-on unix:/tmp/kitty.sock
bind = $mainMod, backspace, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, space, exec, rofi -show drun
bind = $mainMod, P, pseudo, # Dwindle
bind = $mainMod, E, exec, kitty --class yazi -e /usr/bin/yazi
# ~/.config/hypr/hyprland.conf
bind = $mainMod, W, exec, ~/.config/hypr/scripts/theme-switch.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/theme-switch.sh ~/wallpapers/default.jpg


bind = $mainMod, R, exec, kitty --class rmpc -e rmpc



#ss
bind = $mainMod, PRINT, exec, grimblast copysave area ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Tersimpan di ~/Pictures/Screenshots"
bind = , PRINT, exec, grimblast copysave output ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Tersimpan di ~/Pictures/Screenshots"

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

#bind = $mainMod, J, togglesplit,                 # Ganti arah split (H/V)

# Media keys via mpc
bind = , XF86AudioPlay, exec, mpc toggle
bind = , XF86AudioNext, exec, mpc next
bind = , XF86AudioPrev, exec, mpc prev
bind = , XF86AudioStop, exec, mpc stop
bind = , XF86AudioRaiseVolume, exec, mpc volume +5
bind = , XF86AudioLowerVolume, exec, mpc volume -5

# Super + Panah Kanan/Kiri
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1



# Launch Waybar & Notification Daemon
# Autostart aplikasi esensial
# Launch Wallpaper Daemon
#exec-once = hyprpaper
# Autostart aplikasi esensial
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = waybar
exec-once = awww-daemon
exec-once = bash ~/.config/hypr/scripts/restore-wallpaper.sh

# Font rendering lebih tajam
exec-once = fc-cache -fv


# Set GTK Theme secara paksa (opsional jika nwg-look gagal)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Arc-Dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# Environment variables untuk Qt
env = QT_QPA_PLATFORMTHEME,qt5ct
# --- Environment Variables ---
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
MOZ_ENABLE_WAYLAND=1

# Launch Auth Agent (Penting untuk aplikasi yang butuh sudo di GUI)
#exec-once = /usr/lib/polkit-kde-authentication-agent-1


#env AMD driver
env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = AMD_VULKAN_ICD,RADV
env = DXVK_ASYNC,1


#preload = /path/to/your/wallpaper.jpg
#wallpaper = ,/path/to/your/wallpaper.jpg

# Pindah fokus ke workspace (Super + Angka)
bind = ,F1, workspace, 1
bind = ,F2, workspace, 2
bind = ,F3, workspace, 3
bind = ,F4, workspace, 4
bind = ,F5, workspace, 5

bind = , F6, workspace, 6
bind = , F7, workspace, 7
bind = , F8, workspace, 8
bind = , F9, workspace, 9
bind = , F10, workspace, 10

# Pindah jendela aplikasi ke workspace (Super + Shift + Angka)
bind = SUPER, 1, movetoworkspace, 1
bind = SUPER, 2, movetoworkspace, 2
bind = SUPER, 3, movetoworkspace, 3
bind = SUPER, 4, movetoworkspace, 4
bind = SUPER, 5, movetoworkspace, 5

bind = SUPER, Tab, workspace, e+1
bind = SUPER, mouse_up, workspace, e+1
bind = SUPER, mouse_down, workspace, e-1




# Tekan SUPER + R untuk masuk ke mode resize
bind = $mainMod, D, submap, resize

submap = resize

# Menggunakan tombol panah
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10

# Menggunakan tombol HJKL
binde = , L, resizeactive, 10 0
binde = , H, resizeactive, -10 0
binde = , K, resizeactive, 0 -10
binde = , J, resizeactive, 0 10

# Tekan ESCAPE untuk keluar dari mode resize dan kembali ke normal
bind = , escape, submap, reset 

submap = reset

# Resize dengan SUPER + CTRL + Panah
binde = SUPER CTRL, left, resizeactive, -20 0
binde = SUPER CTRL, right, resizeactive, 20 0
binde = SUPER CTRL, up, resizeactive, 0 -20
binde = SUPER CTRL, down, resizeactive, 0 20


bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow


# emoji
 bind = SUPER, period, exec, hypremoj


# --- Pengaturan Global (Semua Mouse & Touchpad) ---
input {
    kb_layout = us
    follow_mouse = 1

    sensitivity = 0        # -1.0 hingga 1.0, 0 = tidak ada perubahan
    accel_profile = flat   # flat = akurasi 1:1, tanpa akselerasi
    force_no_accel = true  # paksa nonaktifkan akselerasi sistem

    touchpad {
        natural_scroll = false
    }
}

# --- Pengaturan Khusus Noir M1 Next ---
device {
    name = c-noir-m1-nex-mouse
    # EDIT BAGIAN INI UNTUK MENAMBAH KECEPATAN
    # Naikkan perlahan, misal: 0.2 -> 0.5 -> 0.8
    sensitivity = 0.8 
    accel_profile = flat
}


# --- Pengaturan Render & Performance ---
source = ~/.cache/wal/colors-hyprland.conf  # WAJIB DI ATAS
general {
	    allow_tearing = true
   
   col.active_border = $color1 $color2 45deg
   col.inactive_border = $background

	layout = dwindle # atau master

    gaps_in = 5      # Jarak antar jendela
    gaps_out = 12   # Jarak jendela ke pinggir layar
    border_size = 2
}

  decoration {
      rounding = 16

    active_opacity = 1.0
    inactive_opacity = 1.0


    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        xray = false

      }

}
 

cursor {
    no_hardware_cursors = false
    # Mengurangi lag pada kursor saat CPU load tinggi
   
}

#windowrule

#ncmpcpp
windowrule {
  name = windowrule-1
  float = on
  size = 720 480
  center = on
  match:title = ^(ncmpcpp)$
}

#hypremoji
windowrule {
  name = hypremoji
  float = on
  move = cursor -50% -5%
  match:title = ^(HyprEmoji)$
}
















# HyprEmoji config
source = ~/.config/hypremoji/hypremoji.conf
